name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-ruff-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-ruff-

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check .

  validate:
    name: Validate (imports)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-validate-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-validate-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install runwayml pytest

      - name: Verify core imports
        run: |
          python -c "import argparse, json, os, sys, pathlib; print('stdlib imports OK')"
          python -c "import sys; sys.path.insert(0, 'scripts'); import runway_video; print('runway_video import OK')"

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-test-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install runwayml pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v
